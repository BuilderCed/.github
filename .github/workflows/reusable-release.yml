name: Release

on:
  workflow_call:
    inputs:
      release-type:
        type: string
        default: 'node'
        description: 'Package type (node, python, simple)'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: googleapis/release-please-action@7987652d64b4581673a76e33ad5e98e3dd56571f # v4.1.3
        id: release
        with:
          release-type: ${{ inputs.release-type }}
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        if: ${{ steps.release.outputs.release_created }}
      - name: Summary
        if: ${{ steps.release.outputs.release_created }}
        run: |
          echo "## Release Created" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.release.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.release.outputs.html_url }}" >> $GITHUB_STEP_SUMMARY
