name: Security Scan

on:
  workflow_call:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    name: Classify Risk Level
    runs-on: ubuntu-latest
    outputs:
      security_level: ${{ steps.classify.outputs.level }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Classify PR Risk
        id: classify
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "level=standard" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "origin/${{ github.event.pull_request.base.ref }}"...HEAD 2>/dev/null || echo "")
          if echo "$CHANGED" | grep -qE "(auth|security|crypto|secrets|\.env|config/prod)"; then
            echo "level=critical" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -qE "(api|database|payment|user)"; then
            echo "level=high" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -qE "\.(md|txt|json)$" && ! echo "$CHANGED" | grep -qE "\.(ts|tsx|js|jsx|py|go|rs)$"; then
            echo "level=docs-only" >> $GITHUB_OUTPUT
          else
            echo "level=standard" >> $GITHUB_OUTPUT
          fi

  scan:
    name: Security Scan
    needs: classify
    if: needs.classify.outputs.security_level != 'docs-only'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: TruffleHog (high/critical only)
        if: needs.classify.outputs.security_level == 'high' || needs.classify.outputs.security_level == 'critical'
        uses: trufflesecurity/trufflehog@v3.93.1
        with:
          path: ./
          extra_args: --only-verified
        continue-on-error: true
      - name: Semgrep (critical only)
        if: needs.classify.outputs.security_level == 'critical'
        uses: semgrep/semgrep-action@v1
        with:
          config: p/security-audit p/secrets
        continue-on-error: true
