name: CI TypeScript

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '22'
      pnpm-version:
        type: string
        default: '9'
      has-tests:
        type: boolean
        default: true
      has-e2e:
        type: boolean
        default: false
      database-url:
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - name: Type Check
        run: |
          if pnpm run typecheck 2>/dev/null; then
            echo "typecheck script passed"
          elif pnpm tsc --noEmit 2>/dev/null; then
            echo "tsc --noEmit passed"
          else
            echo "::error::Type check failed"
            exit 1
          fi

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ inputs.has-tests }}
    env:
      DATABASE_URL: ${{ inputs.database-url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run Tests
        run: |
          if pnpm run test -- --run --coverage 2>/dev/null; then
            echo "test script passed"
          elif pnpm vitest --run --coverage 2>/dev/null; then
            echo "vitest direct passed"
          else
            echo "::error::Tests failed"
            exit 1
          fi
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint-and-typecheck]
    env:
      DATABASE_URL: ${{ inputs.database-url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: ${{ inputs.pnpm-version }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, build]
    if: failure()
    steps:
      - name: Annotate failure
        run: |
          echo "::error::CI failed on ${{ github.ref_name }} — see workflow run for details"
          echo "## CI Failure" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
